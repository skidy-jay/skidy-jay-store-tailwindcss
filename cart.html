<!DOCTYPE html>
<html lang="en">
<head>
  <title>Skidy Jay Store</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbat-dark bg-dark">
    <div class="container">
      <a href="index.html" class="navbar-brand fw-bold text-white">
        Skidy Jay Store
      </a>
      <a href="index.html" class="btn btn-warning fw-bold">
        <i class="bi bi-shop"></i>
        Continue Shopping
      </a>
    </div>
  </nav>
  <div class="container mt-5">
    <h3 class="mb-4"> Shopping Cart</h3>

    <div class="table-responsive">
      <table class="table table-bordered align-middle text-center">
        <thead class="table-dark">
          <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Subtotal</th>
            <th>Remove</th>
          </tr>
        </thead>
        <tbody class="cartcall-js">
          <tr>
            <td class="text-start img-c">
              <img src="image1.jpg" alt="" class="me-2 rounded img-c">
              Skidy Jay Hoodie
            </td>
            <td>$50</td>
            <td>1</td>
            <td>$50</td>
            <td>
              <button class="btn btn-danger btn-sm">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="row justify-content-end total-price-js">
    <div class="col-md-4">
      <div class="card p-3 shadow-sm">
        <h5>Cart Summary</h5>
        <hr>
        <p class="d-flex justify-content-between">
          <span>Subtotal:</span>
          <strong>$50</strong>
        </p>
        <p class="d-flex justify-content-between">
          <span>Delivery:</span>
          <strong>$50</strong>
        </p>
        <hr>
        <h5 class="d-flex justify-content-between">
          <span>Total:</span>
          <strong>$50</strong>
        </h5>
        <button class="btn btn-dark w-100 mt-3">
          Proceed to Checkout
        </button>
      </div>
    </div>
  </div>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
 <script type="module" src="checkout.js"></script>
</html>
