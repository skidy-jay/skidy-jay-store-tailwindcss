<!DOCTYPE html>
<html lang="en">
<head>
  <title>Skidy Jay Store</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="bg-black ">
    <div class="shadow-md p-4 flex justify-between item-center">
      <a href="index.html" class="text-xl font-bold text-orange-500  ">
        Skidy Jay Store
      </a>
      <a href="index.html" class="text-xl text-orange-500 font-bold lg:flex gap-2">
        <i class="bi bi-shop"></i>
       <div class="hidden sm:block">Continue Shopping</div> 
      </a>
    </div>
  </nav>
  <div class="container  maxw-6x1 mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6 ">

    <div class="lg:col-span-2 bg-white rounded-xl shadow p-4 overflow-x-auto">

    <h1 class="text-xl font-bold mb-4"> Shopping Cart</h1>

      <table class="w-full text-left border-collapse ">
        <thead class="bg-gray-100">
          <tr>
            <th class="py-3 px-10 m border-b">Product</th>
            <th class="py-3 px-2 border-b">Price</th>
            <th class="py-3 px-2 border-b ">Quantity</th>
            <th class="py-3 px-2 border-b">Subtotal</th>
            <th class="py-3 px-2 border-b">Remove</th>
          </tr>
        </thead>
        <tbody class="cartcall-js divide-y">
          
        </tbody>
      </table>
    </div>
  </div>
  <div class="grid grid-cols-1 lg:grid-cols-2  total-price-js  ">
    
    
  </div>
 
</body>
 <script type="module" src="checkout.js"></script>
</html>
